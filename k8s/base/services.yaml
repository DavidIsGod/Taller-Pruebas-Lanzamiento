# Per-service Deployment + Service for the 6 chosen microservices.
# image:tag is patched per environment via kustomize overlays.
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: auth-service, labels: { app: auth-service, tier: backend } }
spec:
  replicas: 1
  selector: { matchLabels: { app: auth-service } }
  template:
    metadata: { labels: { app: auth-service } }
    spec:
      containers:
        - name: app
          image: circleguard/auth-service:dev
          ports: [{ containerPort: 8081 }]
          env:
            - { name: SPRING_PROFILES_ACTIVE,    value: kubernetes }
            - { name: IDENTITY_SERVICE_URL,       value: "http://identity-service:8083" }
            - { name: SPRING_DATASOURCE_URL,      value: "jdbc:postgresql://postgres:5432/circleguard_auth" }
            - { name: SPRING_DATASOURCE_USERNAME, value: admin }
            - { name: SPRING_DATASOURCE_PASSWORD, value: password }
          readinessProbe: { tcpSocket: { port: 8081 }, initialDelaySeconds: 30, periodSeconds: 10 }
          livenessProbe:  { tcpSocket: { port: 8081 }, initialDelaySeconds: 90, periodSeconds: 20 }
---
apiVersion: v1
kind: Service
metadata: { name: auth-service }
spec:
  selector: { app: auth-service }
  ports: [{ port: 8081, targetPort: 8081 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: identity-service, labels: { app: identity-service } }
spec:
  replicas: 1
  selector: { matchLabels: { app: identity-service } }
  template:
    metadata: { labels: { app: identity-service } }
    spec:
      containers:
        - name: app
          image: circleguard/identity-service:dev
          ports: [{ containerPort: 8083 }]
          env:
            - { name: SPRING_PROFILES_ACTIVE,         value: kubernetes }
            - { name: SPRING_DATASOURCE_URL,           value: "jdbc:postgresql://postgres:5432/circleguard_identity" }
            - { name: SPRING_DATASOURCE_USERNAME,      value: admin }
            - { name: SPRING_DATASOURCE_PASSWORD,      value: password }
            - { name: SPRING_KAFKA_BOOTSTRAP_SERVERS,  value: "kafka:9092" }
          readinessProbe: { tcpSocket: { port: 8083 }, initialDelaySeconds: 30, periodSeconds: 10 }
          livenessProbe:  { tcpSocket: { port: 8083 }, initialDelaySeconds: 90, periodSeconds: 20 }
---
apiVersion: v1
kind: Service
metadata: { name: identity-service }
spec:
  selector: { app: identity-service }
  ports: [{ port: 8083, targetPort: 8083 }]
---
