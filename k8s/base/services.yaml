            - { name: SPRING_DATASOURCE_URL,           value: "jdbc:postgresql://postgres:5432/circleguard_promotion" }
            - { name: SPRING_DATASOURCE_USERNAME,      value: admin }
            - { name: SPRING_DATASOURCE_PASSWORD,      value: password }
            - { name: SPRING_KAFKA_BOOTSTRAP_SERVERS,  value: "kafka:9092" }
            - { name: KAFKA_BOOTSTRAP,                 value: "kafka:9092" }
            - { name: SPRING_NEO4J_URI,                value: "bolt://neo4j:7687" }
            - { name: SPRING_NEO4J_AUTHENTICATION_USERNAME, value: neo4j }
            - { name: SPRING_NEO4J_AUTHENTICATION_PASSWORD, value: password }
