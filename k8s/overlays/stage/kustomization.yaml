apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: circleguard-stage
resources:
  - ../../base
images:
  - { name: circleguard/auth-service,         newTag: stage }
  - { name: circleguard/identity-service,     newTag: stage }
  - { name: circleguard/promotion-service,    newTag: stage }
  - { name: circleguard/notification-service, newTag: stage }
  - { name: circleguard/form-service,         newTag: stage }
  - { name: circleguard/gateway-service,      newTag: stage }
patches:
  - target: { kind: Namespace, name: circleguard }
    patch: |-
      - op: replace
        path: /metadata/name
        value: circleguard-stage
  - target: { kind: Deployment, name: ".*" }
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
