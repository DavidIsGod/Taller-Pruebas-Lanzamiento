apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: circleguard-prod
resources:
  - ../../base
images:
  - { name: circleguard/auth-service,         newName: circleguard/auth-service,         newTag: prod }
  - { name: circleguard/identity-service,     newName: circleguard/identity-service,     newTag: prod }
  - { name: circleguard/promotion-service,    newName: circleguard/promotion-service,    newTag: prod }
  - { name: circleguard/notification-service, newName: circleguard/notification-service, newTag: prod }
  - { name: circleguard/form-service,         newName: circleguard/form-service,         newTag: prod }
  - { name: circleguard/gateway-service,      newName: circleguard/gateway-service,      newTag: prod }
patches:
  - target: { kind: Namespace, name: circleguard }
    patch: |-
      - op: replace
        path: /metadata/name
        value: circleguard-prod
  # Use IfNotPresent so kind doesn't try to pull from a remote registry.
  - target: { kind: Deployment }
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
