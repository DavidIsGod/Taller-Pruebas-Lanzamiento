apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: circleguard-prod
resources:
  - ../../base
images:
  # Master overlay uses immutable git-sha tags injected by the pipeline.
  - { name: circleguard/auth-service,         newTag: TAG_PLACEHOLDER }
  - { name: circleguard/identity-service,     newTag: TAG_PLACEHOLDER }
  - { name: circleguard/promotion-service,    newTag: TAG_PLACEHOLDER }
  - { name: circleguard/notification-service, newTag: TAG_PLACEHOLDER }
  - { name: circleguard/form-service,         newTag: TAG_PLACEHOLDER }
  - { name: circleguard/gateway-service,      newTag: TAG_PLACEHOLDER }
patches:
  - target: { kind: Namespace, name: circleguard }
    patch: |-
      - op: replace
        path: /metadata/name
        value: circleguard-prod
  - target: { kind: Deployment, name: ".*" }
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: add
        path: /spec/strategy
        value:
          type: RollingUpdate
          rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
